<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Challenge 58</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --bg: #0D0D2B;
            --bg2: #1a1a4a;
            --card: rgba(255,255,255,0.06);
            --card-border: rgba(255,255,255,0.12);
            --primary: #7C6EFA;
            --primary-light: #9D91FB;
            --gold: #FFD700;
            --green: #00E676;
            --red: #FF5252;
            --text: #FFFFFF;
            --text-muted: rgba(255,255,255,0.55);
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, var(--bg) 0%, var(--bg2) 100%);
            min-height: 100vh;
            color: var(--text);
            overflow-x: hidden;
        }

        .screen {
            display: none;
            min-height: 100vh;
            padding: 16px 20px;
            max-width: 480px;
            margin: 0 auto;
            flex-direction: column;
        }
        .screen.active { display: flex; animation: slideIn 0.3s ease; }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(16px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        /* HEADER */
        .logo { font-size: 2.4rem; font-weight: 900; letter-spacing: -1px; line-height: 1; }
        .logo span { color: var(--gold); }
        .logo-sub { font-size: 0.7rem; letter-spacing: 4px; text-transform: uppercase; color: var(--text-muted); margin-top: 2px; }

        /* CARD */
        .card {
            background: var(--card);
            border: 1px solid var(--card-border);
            border-radius: 20px;
            padding: 22px;
            backdrop-filter: blur(12px);
        }

        /* INPUTS */
        .input-group { margin-bottom: 14px; }
        .input-group label { display: block; font-size: 0.72rem; color: var(--text-muted); margin-bottom: 7px; text-transform: uppercase; letter-spacing: 1px; }
        input {
            width: 100%;
            background: rgba(255,255,255,0.07);
            border: 1px solid rgba(255,255,255,0.14);
            border-radius: 12px;
            padding: 13px 15px;
            color: white;
            font-family: 'Poppins', sans-serif;
            font-size: 1rem;
            outline: none;
            transition: border-color 0.2s;
        }
        input:focus { border-color: var(--primary); }
        input::placeholder { color: rgba(255,255,255,0.28); }

        /* BUTTONS */
        .btn {
            width: 100%; padding: 15px;
            border-radius: 14px; border: none;
            font-family: 'Poppins', sans-serif;
            font-size: 0.95rem; font-weight: 600;
            cursor: pointer;
            transition: transform 0.12s, opacity 0.12s;
        }
        .btn:active { transform: scale(0.97); }
        .btn-primary { background: linear-gradient(135deg, #7C6EFA 0%, #5A4EF0 100%); color: white; }
        .btn-gold    { background: linear-gradient(135deg, #FFD700 0%, #FFA500 100%); color: #1a1a1a; }
        .btn-ghost   { background: transparent; border: 1px solid rgba(255,255,255,0.18); color: var(--text-muted); }
        .btn-sm      { padding: 10px 18px; font-size: 0.82rem; width: auto; }
        .btn-danger  { background: rgba(255,82,82,0.2); border: 1px solid rgba(255,82,82,0.4); color: #FF8A8A; }
        .mt-10 { margin-top: 10px; }
        .mt-16 { margin-top: 16px; }
        .mt-20 { margin-top: 20px; }
        .mt-auto { margin-top: auto; }

        /* MESSAGES */
        .msg { padding: 11px 15px; border-radius: 10px; font-size: 0.82rem; margin-bottom: 12px; }
        .msg-error   { background: rgba(255,82,82,0.14); border: 1px solid rgba(255,82,82,0.3); color: #FF8A8A; }
        .msg-success { background: rgba(0,230,118,0.14); border: 1px solid rgba(0,230,118,0.3); color: #00E676; }

        /* DIVIDER */
        .divider { display: flex; align-items: center; gap: 10px; margin: 18px 0; color: var(--text-muted); font-size: 0.78rem; }
        .divider::before, .divider::after { content: ''; flex: 1; height: 1px; background: rgba(255,255,255,0.1); }

        /* TIMER */
        .timer-badge { display: inline-flex; align-items: center; gap: 6px; background: rgba(255,255,255,0.08); border-radius: 20px; padding: 6px 13px; font-size: 0.82rem; font-weight: 600; }
        .timer-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--green); animation: pulse 1s infinite; }
        @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.25} }

        /* CHALLENGE CARD */
        .challenge-category { font-size: 0.7rem; text-transform: uppercase; letter-spacing: 2px; color: var(--primary-light); margin-bottom: 6px; }
        .challenge-question  { font-size: 1.15rem; font-weight: 600; line-height: 1.45; margin-bottom: 20px; }
        .type-badge { display: inline-block; padding: 3px 11px; border-radius: 20px; font-size: 0.7rem; font-weight: 600; text-transform: uppercase; margin-bottom: 8px; }
        .tb-trivia      { background: rgba(124,110,250,0.3); }
        .tb-numeric     { background: rgba(255,165,0,0.3); }
        .tb-connections { background: rgba(0,230,118,0.3); }
        .tb-ordering    { background: rgba(255,165,0,0.3); }
        .tb-crossword   { background: rgba(255,100,180,0.25); color: #ff80c8; }

        /* CROSSWORD */
        .cw-wrap { display: flex; flex-direction: column; gap: 12px; }
        .cw-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 3px;
            background: rgba(0,0,0,0.5);
            border-radius: 10px;
            padding: 4px;
        }
        .cw-cell {
            position: relative;
            background: rgba(255,255,255,0.1);
            border-radius: 4px;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer;
            min-height: 42px;
            transition: background 0.12s;
            user-select: none;
        }
        .cw-cell.black { background: rgba(0,0,0,0.7); cursor: default; border-radius: 4px; }
        .cw-cell.cw-word { background: rgba(124,110,250,0.28); }
        .cw-cell.cw-sel { background: var(--primary) !important; }
        .cw-cell.cw-correct { background: rgba(0,230,118,0.35) !important; }
        .cw-num {
            position: absolute; top: 2px; left: 3px;
            font-size: 0.48rem; color: rgba(255,255,255,0.5);
            font-weight: 700; line-height: 1; pointer-events: none;
        }
        .cw-letter {
            font-size: 1.05rem; font-weight: 800; color: white;
            text-transform: uppercase; pointer-events: none;
        }
        .cw-keyboard {
            display: flex; flex-wrap: wrap; gap: 4px; justify-content: center;
        }
        .cw-key {
            min-width: 26px; width: 30px; padding: 9px 4px;
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.15); border-radius: 7px;
            color: white; font-family: 'Poppins', sans-serif;
            font-size: 0.75rem; font-weight: 600; cursor: pointer;
            transition: background 0.1s; text-align: center;
        }
        .cw-key:active { background: var(--primary); transform: scale(0.92); }
        .cw-key-del { background: rgba(255,82,82,0.2); color: #FF8A8A; width: auto; }
        .cw-clues { display: flex; gap: 12px; margin-top: 4px; }
        .cw-clue-col { flex: 1; }
        .cw-clue-title { font-size: 0.62rem; font-weight: 700; color: var(--primary-light); letter-spacing: 1px; margin-bottom: 6px; text-transform: uppercase; }
        .cw-clue-item {
            font-size: 0.74rem; color: var(--text-muted); padding: 4px 7px;
            border-radius: 6px; cursor: pointer; margin-bottom: 3px;
            transition: background 0.15s; border: 1px solid transparent;
        }
        .cw-clue-item:hover { background: rgba(255,255,255,0.06); }
        .cw-clue-item.cw-clue-active { background: rgba(124,110,250,0.2); color: white; border-color: rgba(124,110,250,0.4); }

        /* TRIVIA */
        .option-btn {
            width: 100%; padding: 14px 16px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.11);
            border-radius: 14px; color: white;
            font-family: 'Poppins', sans-serif; font-size: 0.92rem;
            text-align: left; cursor: pointer; margin-bottom: 9px;
            transition: all 0.18s; display: flex; align-items: center; gap: 12px;
        }
        .option-btn:hover  { background: rgba(255,255,255,0.09); border-color: var(--primary); }
        .option-btn.selected { background: rgba(124,110,250,0.28); border-color: var(--primary); }
        .option-btn.correct  { background: rgba(0,230,118,0.2); border-color: var(--green); }
        .option-btn.wrong    { background: rgba(255,82,82,0.2); border-color: var(--red); }
        .option-letter { width: 28px; height: 28px; border-radius: 8px; background: rgba(255,255,255,0.1); display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 0.78rem; flex-shrink: 0; }

        /* NUMERIC */
        .numeric-input { font-size: 2.2rem; font-weight: 700; text-align: center; padding: 18px; letter-spacing: 2px; }

        /* CONNECTIONS */
        .connections-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 14px; }
        .connection-item {
            padding: 13px 8px; background: rgba(255,255,255,0.06);
            border: 1px solid rgba(255,255,255,0.11);
            border-radius: 12px; text-align: center;
            font-size: 0.82rem; font-weight: 500;
            cursor: pointer; transition: all 0.18s; user-select: none;
        }
        .connection-item:hover   { background: rgba(255,255,255,0.1); }
        .connection-item.selected{ background: rgba(124,110,250,0.38); border-color: var(--primary); transform: scale(1.02); }
        .connection-item.solved  { opacity: 0.38; cursor: default; pointer-events: none; }
        .connection-item.shake   { animation: shake 0.4s ease; }
        @keyframes shake { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-6px)} 75%{transform:translateX(6px)} }
        .solved-group { border-radius: 12px; padding: 11px 15px; margin-bottom: 8px; text-align: center; }
        .solved-group-name  { font-weight: 700; font-size: 0.88rem; }
        .solved-group-items { font-size: 0.76rem; opacity: 0.8; margin-top: 3px; }

        /* ORDERING */
        .order-slot {
            display: flex; align-items: center; gap: 12px;
            padding: 12px 14px;
            background: rgba(255,255,255,0.04);
            border: 1.5px dashed rgba(255,255,255,0.14);
            border-radius: 12px; margin-bottom: 8px;
            min-height: 50px; cursor: pointer; transition: all 0.18s;
        }
        .order-slot.has-item  { background: rgba(255,255,255,0.07); border-style: solid; border-color: rgba(255,255,255,0.2); }
        .order-slot.active-slot { border-color: var(--primary); background: rgba(124,110,250,0.14); }
        .slot-number { width: 26px; height: 26px; border-radius: 7px; background: rgba(255,255,255,0.1); display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 0.76rem; flex-shrink: 0; color: var(--text-muted); }
        .order-items-pool { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 14px; }
        .order-item {
            padding: 9px 14px;
            background: rgba(124,110,250,0.18);
            border: 1px solid rgba(124,110,250,0.38);
            border-radius: 10px; font-size: 0.82rem; font-weight: 500;
            cursor: pointer; transition: all 0.18s; user-select: none;
        }
        .order-item:hover { background: rgba(124,110,250,0.3); }
        .order-item.picked { background: rgba(124,110,250,0.5); border-color: var(--primary); transform: scale(1.04); }

        /* RESULT */
        .result-emoji { font-size: 3.5rem; text-align: center; margin-bottom: 6px; }
        .score-big { font-size: 4.5rem; font-weight: 900; color: var(--gold); text-align: center; line-height: 1; }
        .score-label { text-align: center; color: var(--text-muted); font-size: 0.8rem; margin-top: 4px; letter-spacing: 2px; text-transform: uppercase; }
        .score-breakdown { display: flex; gap: 10px; justify-content: center; margin-top: 18px; }
        .score-pill { background: rgba(255,255,255,0.07); border-radius: 14px; padding: 10px 16px; font-size: 0.85rem; text-align: center; min-width: 72px; }
        .score-pill strong { display: block; font-size: 1rem; font-weight: 700; }
        .score-pill span { font-size: 0.68rem; color: var(--text-muted); margin-top: 2px; display: block; text-transform: uppercase; letter-spacing: 1px; }

        /* LEADERBOARD */
        .lb-row { display: flex; align-items: center; padding: 12px 14px; border-radius: 12px; margin-bottom: 7px; background: rgba(255,255,255,0.04); gap: 11px; }
        .lb-row.me { background: rgba(124,110,250,0.14); border: 1px solid rgba(124,110,250,0.3); }
        .lb-rank { font-weight: 800; font-size: 1rem; width: 26px; text-align: center; flex-shrink: 0; }
        .lb-avatar { width: 36px; height: 36px; border-radius: 10px; background: var(--primary); display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 0.82rem; flex-shrink: 0; }
        .lb-name { flex: 1; font-weight: 500; font-size: 0.88rem; }
        .lb-pts  { font-weight: 700; font-size: 0.92rem; color: var(--gold); }

        /* BOTTOM NAV */
        .bottom-nav { display: flex; gap: 7px; padding: 14px 0 6px; margin-top: auto; flex-shrink: 0; }
        .nav-btn { flex: 1; padding: 11px 6px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.09); border-radius: 12px; color: var(--text-muted); font-family: 'Poppins', sans-serif; font-size: 0.75rem; font-weight: 500; cursor: pointer; transition: all 0.18s; }
        .nav-btn.active { background: rgba(124,110,250,0.2); border-color: var(--primary); color: white; }

        /* LOADING */
        .loading { display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 14px; padding: 40px; color: var(--text-muted); }
        .spinner { width: 34px; height: 34px; border: 3px solid rgba(255,255,255,0.08); border-top-color: var(--primary); border-radius: 50%; animation: spin 0.7s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* EMPTY STATE */
        .empty-state { text-align: center; padding: 36px 20px; color: var(--text-muted); }
        .empty-icon  { font-size: 2.8rem; margin-bottom: 12px; }

        /* ADMIN */
        .admin-card { padding: 14px; background: rgba(255,255,255,0.04); border-radius: 12px; margin-bottom: 9px; border: 1px solid rgba(255,255,255,0.08); }
        .admin-card.active-challenge { border-color: var(--gold); background: rgba(255,215,0,0.05); }

        /* SCROLL */
        .scroll-content { flex: 1; overflow-y: auto; padding-bottom: 8px; }
        .scroll-content::-webkit-scrollbar { width: 0; }

        /* MISC */
        .text-muted { color: var(--text-muted); }
        .text-gold  { color: var(--gold); }
        .fw-700 { font-weight: 700; }
        .fs-sm  { font-size: 0.82rem; }
        .fs-xs  { font-size: 0.72rem; }
        .hint-box { background: rgba(255,255,255,0.05); border-radius: 10px; padding: 10px 14px; font-size: 0.8rem; color: var(--text-muted); margin-bottom: 14px; }

        /* SPEED METER */
        .speed-bar { height: 6px; border-radius: 3px; background: rgba(255,255,255,0.1); margin-top: 8px; overflow: hidden; }
        .speed-fill { height: 100%; border-radius: 3px; background: linear-gradient(90deg, var(--green), var(--gold)); transition: width 1s linear; }
    </style>
</head>
<body>

<!-- ════════════════════════════════════
     SCREEN: LOGIN
═════════════════════════════════════ -->
<div id="screen-login" class="screen">
    <div style="text-align:center; padding: 36px 0 24px;">
        <div class="logo">CHALLENGE <span>58</span></div>
        <div class="logo-sub">EMH Hacoaj · Camada 58</div>
    </div>

    <div class="card">
        <div id="login-error" class="msg msg-error" style="display:none"></div>
        <div class="input-group">
            <label>Usuario</label>
            <input type="text" id="login-username" placeholder="Tu usuario" autocomplete="off" autocapitalize="none" spellcheck="false">
        </div>
        <div class="input-group">
            <label>PIN</label>
            <input type="password" id="login-pin" placeholder="4 dígitos" maxlength="4" inputmode="numeric">
        </div>
        <button class="btn btn-primary" onclick="doLogin()">Entrar →</button>
    </div>

    <div class="divider">¿Primera vez?</div>
    <button class="btn btn-ghost" onclick="showScreen('screen-register')">Crear cuenta</button>

    <div style="text-align:center; margin-top:auto; padding: 20px 0 6px;">
        <button style="background:none;border:none;color:rgba(255,255,255,0.15);font-size:0.75rem;cursor:pointer;" onclick="showAdminEntry()">⚙ admin</button>
    </div>
</div>

<!-- ════════════════════════════════════
     SCREEN: REGISTER
═════════════════════════════════════ -->
<div id="screen-register" class="screen">
    <div style="padding: 24px 0 20px;">
        <div class="logo" style="font-size:1.9rem;">CHALLENGE <span>58</span></div>
        <div style="font-size:1.1rem; font-weight:700; margin-top:14px;">Crear cuenta</div>
        <div class="fs-sm text-muted" style="margin-top:4px;">Registrate una sola vez y tu puntaje queda guardado siempre</div>
    </div>

    <div class="card">
        <div id="register-error" class="msg msg-error" style="display:none"></div>
        <div class="input-group">
            <label>Nombre y apellido</label>
            <input type="text" id="reg-nombre" placeholder="Ej: Lucía Rodríguez">
        </div>
        <div class="input-group">
            <label>Usuario (sin espacios)</label>
            <input type="text" id="reg-username" placeholder="Ej: luci.r" autocapitalize="none" spellcheck="false">
        </div>
        <div class="input-group">
            <label>PIN — 4 dígitos</label>
            <input type="password" id="reg-pin" placeholder="Elegí 4 dígitos" maxlength="4" inputmode="numeric">
        </div>
        <div class="input-group">
            <label>Confirmar PIN</label>
            <input type="password" id="reg-pin2" placeholder="Repetí el PIN" maxlength="4" inputmode="numeric">
        </div>
        <button class="btn btn-primary" onclick="doRegister()">Registrarme</button>
    </div>

    <button class="btn btn-ghost mt-10" onclick="showScreen('screen-login')">← Volver</button>
</div>

<!-- ════════════════════════════════════
     SCREEN: HOME
═════════════════════════════════════ -->
<div id="screen-home" class="screen">
    <!-- Top bar -->
    <div style="display:flex; justify-content:space-between; align-items:center; padding: 18px 0 14px; flex-shrink:0;">
        <div>
            <div class="logo" style="font-size:1.6rem;">CHALLENGE <span>58</span></div>
        </div>
        <div style="text-align:right;">
            <div id="home-username" style="font-weight:600; font-size:0.88rem;"></div>
            <div style="display:flex; align-items:center; gap:8px; justify-content:flex-end;">
                <div id="home-pts" style="color:var(--gold); font-size:0.78rem; font-weight:700;"></div>
                <button onclick="doLogout()" style="background:none;border:none;color:rgba(255,255,255,0.3);font-size:0.72rem;cursor:pointer;padding:2px 0;" title="Cerrar sesión">salir</button>
            </div>
        </div>
    </div>

    <!-- Dynamic content -->
    <div id="home-content" class="scroll-content">
        <div class="loading"><div class="spinner"></div></div>
    </div>

    <!-- Nav -->
    <div class="bottom-nav">
        <button class="nav-btn active" id="nav-challenge"   onclick="switchTab('challenge')">🎯 Desafío</button>
        <button class="nav-btn"         id="nav-leaderboard" onclick="switchTab('leaderboard')">🏆 Ranking</button>
        <button class="nav-btn"         id="nav-history"     onclick="switchTab('history')">📊 Historial</button>
    </div>
</div>

<!-- ════════════════════════════════════
     SCREEN: PLAYING
═════════════════════════════════════ -->
<div id="screen-playing" class="screen">
    <!-- Header row -->
    <div style="display:flex; align-items:center; justify-content:space-between; padding: 14px 0 10px; flex-shrink:0;">
        <div>
            <div id="playing-category" class="challenge-category"></div>
            <div id="playing-type-label" style="font-size:0.76rem; color:var(--text-muted);"></div>
        </div>
        <div style="display:flex; align-items:center; gap:8px;">
            <div id="playing-timer" class="timer-badge">
                <div class="timer-dot"></div>
                <span id="timer-display">0:00</span>
            </div>
        </div>
    </div>

    <!-- Challenge content -->
    <div id="playing-content" class="scroll-content"></div>

    <!-- Submit button (shown for numeric + ordering) -->
    <div id="playing-submit" style="padding: 12px 0; flex-shrink:0; display:none;">
        <button class="btn btn-gold" onclick="doSubmit()">Confirmar respuesta ✓</button>
    </div>
</div>

<!-- ════════════════════════════════════
     SCREEN: RESULT
═════════════════════════════════════ -->
<div id="screen-result" class="screen" style="align-items:center; justify-content:center;">
    <div class="result-emoji" id="result-emoji">🎉</div>
    <div class="score-big"   id="result-score">0</div>
    <div class="score-label">PUNTOS</div>

    <div class="score-breakdown">
        <div class="score-pill">
            <strong id="result-accuracy">0%</strong>
            <span>Precisión</span>
        </div>
        <div class="score-pill">
            <strong id="result-speed">×1.0</strong>
            <span>Velocidad</span>
        </div>
        <div class="score-pill">
            <strong id="result-time">0s</strong>
            <span>Tu tiempo</span>
        </div>
    </div>

    <div id="result-message" style="margin-top:18px; color:var(--text-muted); font-size:0.88rem; text-align:center; max-width:280px;"></div>

    <div style="margin-top:28px; width:100%; max-width:320px;">
        <button class="btn btn-primary" onclick="showHomeTab('leaderboard')">Ver ranking 🏆</button>
        <button class="btn btn-ghost mt-10" onclick="showHomeTab('challenge')">← Volver al inicio</button>
    </div>
</div>

<!-- ════════════════════════════════════
     SCREEN: ADMIN
═════════════════════════════════════ -->

function shuffle(arr) {
    const a = [...arr];
    for (let i = a.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [a[i], a[j]] = [a[j], a[i]];
    }
    return a;
}

function formatTime(seconds) {
    const m = Math.floor(seconds / 60);
    const s = seconds % 60;
    return `${m}:${String(s).padStart(2, '0')}`;
}

// API  (Google Apps Script o demo local)
// ─────────────────────────────────────
async function apiCall(action, data = {}) {
    if (API_URL === 'TU_URL_DE_APPS_SCRIPT_AQUI') return simulateAPI(action, data);

    // Challenges siempre se sirven desde el JS local (no hace falta tenerlos en la planilla)
    if (action === 'adminGetChallenges') {
        const meta = await apiBackend('adminGetMeta', data);
        return { success: true, challenges: CHALLENGES, activeId: meta.activeId || 0, totalSubs: meta.totalSubs || 0 };
    }
    if (action === 'getChallenge') {
        const meta = await apiBackend('getChallenge', data);
        if (!meta.success) return meta;
        if (!meta.activeId) return { success: true, challenge: null };
        const ch = CHALLENGES.find(c => c.id === parseInt(meta.activeId));
        return { success: true, challenge: ch ? { ...ch, publishedAt: meta.publishedAt } : null,
            alreadySubmitted: meta.alreadySubmitted, previousScore: meta.previousScore };
    }

    return apiBackend(action, data);
}

async function apiBackend(action, data = {}) {
    try {
        const params = new URLSearchParams({ action });
        Object.entries(data).forEach(([k, v]) => {
            params.set(k, typeof v === 'object' ? JSON.stringify(v) : v);
        });
        const r    = await fetch(`${API_URL}?${params.toString()}`, { method: 'GET', redirect: 'follow' });
        const text = await r.text();
        return JSON.parse(text);
    } catch (e) {
        console.error(e);
        return { success: false, error: 'Error de conexión' };
    }
}

// Demo local (sin backend)
function simulateAPI(action, data) {
    const users = JSON.parse(localStorage.getItem('c58_users') || '[]');

    if (action === 'register') {
        if (users.find(u => u.username === data.username))
            return { success: false, error: 'Ese usuario ya existe' };
        const user = { id: Date.now(), username: data.username, nombre: data.nombre, pin: data.pin, totalPoints: 0 };
        users.push(user);
        localStorage.setItem('c58_users', JSON.stringify(users));
        return { success: true, user };
    }

    if (action === 'login') {
        const user = users.find(u => u.username === data.username && u.pin === data.pin);
        return user ? { success: true, user } : { success: false, error: 'Usuario o PIN incorrecto' };
    }

    if (action === 'getChallenge') {
        const activeId    = parseInt(localStorage.getItem('c58_active') || '0');
        const publishedAt = localStorage.getItem('c58_published') || new Date().toISOString();
        const ch = CHALLENGES.find(c => c.id === activeId);
        return { success: true, challenge: ch ? { ...ch, publishedAt } : null };
    }

    if (action === 'submit') {
        const idx = users.findIndex(u => u.id === data.userId);
        if (idx >= 0) { users[idx].totalPoints = (users[idx].totalPoints || 0) + data.score; }
        localStorage.setItem('c58_users', JSON.stringify(users));
        const subs = JSON.parse(localStorage.getItem('c58_all_subs') || '[]');
        subs.push({ ...data, submittedAt: new Date().toISOString() });
        localStorage.setItem('c58_all_subs', JSON.stringify(subs));
        return { success: true };
    }

    if (action === 'leaderboard') {
        const sorted = [...users].sort((a, b) => (b.totalPoints || 0) - (a.totalPoints || 0));
        return { success: true, leaderboard: sorted.map((u, i) => ({ rank: i+1, username: u.username, nombre: u.nombre, points: u.totalPoints || 0 })) };
    }

    if (action === 'adminGetChallenges') {
        const activeId  = parseInt(localStorage.getItem('c58_active') || '0');
        const totalSubs = JSON.parse(localStorage.getItem('c58_all_subs') || '[]').length;
        return { success: true, challenges: CHALLENGES, activeId, totalSubs };
    }

    if (action === 'adminActivate') {
        const cid = parseInt(data.challengeId) || 0;
        localStorage.setItem('c58_active', String(cid));
        if (cid > 0) localStorage.setItem('c58_published', new Date().toISOString());
        return { success: true };
    }

    return { success: false, error: 'Acción desconocida' };
}

async function doLogin() {
    const username = $('login-username').value.trim().toLowerCase();
    const pin      = $('login-pin').value.trim();
    if (!username || !pin) return showError('login-error', 'Completá todos los campos');

    if (username === 'admin' && pin === ADMIN_PIN) { enterAdmin(); return; }

    const res = await apiCall('login', { username, pin });
    if (!res.success) return showError('login-error', res.error || 'Error al ingresar');

    currentUser = res.user;
    saveUser(currentUser);
    enterApp();
}

async function doRegister() {
    const nombre   = $('reg-nombre').value.trim();
    const username = $('reg-username').value.trim().toLowerCase();
    const pin      = $('reg-pin').value.trim();
    const pin2     = $('reg-pin2').value.trim();

    if (!nombre || !username || !pin || !pin2) return showError('register-error', 'Completá todos los campos');
    if (pin !== pin2)    return showError('register-error', 'Los PINs no coinciden');
    if (pin.length !== 4 || isNaN(pin)) return showError('register-error', 'El PIN debe ser 4 dígitos');
    if (/\s/.test(username)) return showError('register-error', 'El usuario no puede tener espacios');

    const res = await apiCall('register', { nombre, username, pin });
    if (!res.success) return showError('register-error', res.error || 'Error al registrarse');

    currentUser = res.user;
    saveUser(currentUser);
    enterApp();
}

function showAdminEntry() {
    $('login-username').value = 'admin';

}

function doLogout() {
    currentUser = null;

}

    $('home-content').innerHTML = '<div class="loading"><div class="spinner"></div></div>';

    const res = await apiCall('getChallenge', { userId: currentUser?.id });
    if (!res.success) { $('home-content').innerHTML = `<div class="empty-state"><div class="empty-icon">⚠️</div>Error al cargar</div>`; return; }

    if (!res.challenge) {
        $('home-content').innerHTML = `
            <div class="empty-state">
                <div class="empty-icon">⏳</div>
                <div style="font-size:1rem; font-weight:600; color:white; margin-bottom:8px;">Sin desafío activo</div>
                <div>El próximo Challenge 58 llega pronto.<br>Atento al grupo de WhatsApp! 📲</div>
            </div>`;
        return;
    }

    currentChallenge = res.challenge;

    // Already submitted? (chequeo del servidor + localStorage como fallback)
    const subs  = getSubmissions();
    const score = res.previousScore || subs[currentChallenge.id]?.score;
    if (res.alreadySubmitted || subs[currentChallenge.id]) {
        $('home-content').innerHTML = `
            <div class="card" style="text-align:center; margin-bottom:14px;">
                <div style="font-size:2rem; margin-bottom:8px;">✅</div>
                <div style="font-weight:700;">Ya respondiste este challenge</div>
                <div style="color:var(--text-muted); font-size:0.82rem; margin-top:6px;">Obtuviste <strong class="text-gold">${score} puntos</strong></div>
            </div>
            ${challengePreviewHTML(currentChallenge, false)}
            <button class="btn btn-ghost mt-10" onclick="switchTab('leaderboard')">Ver ranking 🏆</button>`;
        return;
    }

    $('home-content').innerHTML = challengePreviewHTML(currentChallenge, true);
}

function challengePreviewHTML(ch, showPlay) {
    const pub = new Date(ch.publishedAt);
    const elapsedMin = (Date.now() - pub) / 60000;
    const mult = Math.max(1.0, 2.0 - elapsedMin / 60).toFixed(1);
    const fillPct = Math.min(100, (elapsedMin / 60) * 100);

    return `
        <div class="card" style="margin-bottom:12px;">
            <div class="challenge-category">${ch.category}</div>
            <div class="type-badge ${typeBadge[ch.type]}">${typeEmoji[ch.type]}</div>
            <div class="challenge-question">${ch.question}</div>
            <div style="font-size:0.78rem; color:var(--text-muted); margin-bottom:6px;">⚡ Multiplicador de velocidad actual: <strong class="text-gold">×${mult}</strong></div>
            <div class="speed-bar"><div class="speed-fill" style="width:${100-fillPct}%"></div></div>
            ${showPlay ? `<button class="btn btn-gold" style="margin-top:18px;" onclick="startChallenge()">Jugar ahora ⚡</button>` : ''}
        </div>
        <div class="card fs-sm text-muted">
            <strong style="color:white;">¿Cómo se puntúa?</strong><br><br>
            Puntaje final = <strong>Precisión</strong> × <strong>Multiplicador de velocidad</strong><br><br>
            Al activarse el challenge el multiplicador es ×2.0 y baja gradualmente hasta ×1.0 después de 1 hora. Responder rápido y bien es la clave.
        </div>`;
}

// ─────────────────────────────────────
// START CHALLENGE (playing screen)
// ─────────────────────────────────────
function startChallenge() {
    if (!currentChallenge) return;
    // reset state
    selectedAnswer = null;
    selectedItems  = [];
    solvedGroups   = [];
    pickedItem     = null;
    orderedSlots   = new Array((currentChallenge.items || []).length).fill(null);
    cwUserGrid     = [];
    cwSelRow       = -1;
    cwSelCol       = -1;
    cwDir          = 'across';

    challengeStartTime = Date.now();

    $('playing-category').textContent   = currentChallenge.category;
    $('playing-type-label').textContent = typeLabel[currentChallenge.type] || '';

    if (timerInterval) clearInterval(timerInterval);
    timerInterval = setInterval(() => {
        $('timer-display').textContent = formatTime(Math.floor((Date.now() - challengeStartTime) / 1000));
    }, 1000);
    $('timer-display').textContent = '0:00';

    renderPlayingChallenge();
    showScreen('screen-playing');
}

function renderPlayingChallenge() {
    const ch = currentChallenge;
    let html = `<div class="challenge-question">${ch.question}</div>`;

    if (ch.type === 'trivia') {
        html += renderTrivia(ch);
        $('playing-submit').style.display = 'none';
    } else if (ch.type === 'numeric') {
        html += renderNumeric(ch);
        $('playing-submit').style.display = 'block';
    } else if (ch.type === 'connections') {
        html += renderConnections(ch);
        $('playing-submit').style.display = 'none';
    } else if (ch.type === 'ordering') {
        html += renderOrdering(ch);
        $('playing-submit').style.display = 'none'; // shows after all slots filled
    } else if (ch.type === 'crossword') {
        html += renderCrossword(ch);
        $('playing-submit').style.display = 'none'; // auto-submits when grid is full
    }

    $('playing-content').innerHTML = html;
}

// ── TRIVIA ──────────────────────────
function renderTrivia(ch) {
    return ch.options.map((opt, i) => `
        <button class="option-btn" id="opt-${i}" onclick="selectTrivia(${i})">
            <div class="option-letter">${['A','B','C','D'][i]}</div>
            <div>${opt}</div>
        </button>`).join('');
}

function selectTrivia(idx) {
    if (selectedAnswer !== null) return;
    selectedAnswer = idx;
    const correct  = currentChallenge.answer;
    currentChallenge.options.forEach((_, i) => {
        const btn = $(`opt-${i}`);
        if (!btn) return;
        btn.style.pointerEvents = 'none';
        if (i === correct) btn.classList.add('correct');
        else if (i === idx) btn.classList.add('wrong');
    });
    setTimeout(doSubmit, 1400);
}

// ── NUMERIC ─────────────────────────
function renderNumeric(ch) {
    return `
        <div class="hint-box">💡 ${ch.hint}</div>
        <input type="number" class="numeric-input" id="numeric-answer" placeholder="?" inputmode="numeric" style="background:rgba(255,255,255,0.07);border:1px solid rgba(255,255,255,0.14);border-radius:14px;width:100%;">
        ${ch.unit ? `<div style="text-align:center; color:var(--text-muted); font-size:0.82rem; margin-top:8px;">${ch.unit}</div>` : ''}`;
}

// ── CONNECTIONS ─────────────────────
function renderConnections(ch) {
    const allItems = ch.groups.flatMap((g, gi) => g.items.map(item => ({ item, gi })));
    const shuffled = shuffle(allItems);
    currentChallenge._shuffled = shuffled;

    let html = '<div id="solved-groups"></div>';
    html += '<div class="connections-grid" id="conn-grid">';
    shuffled.forEach((obj, i) => {
        html += `<div class="connection-item" id="conn-${i}" onclick="selectConn(${i})">${obj.item}</div>`;
    });
    html += '</div>';
    html += `
        <div style="display:flex; gap:8px; margin-top:4px;">
            <button class="btn btn-primary" onclick="checkConn()" style="flex:1;">Confirmar grupo</button>
            <button class="btn btn-ghost btn-sm" onclick="clearConn()">Limpiar</button>
        </div>
        <div style="text-align:center; font-size:0.76rem; color:var(--text-muted); margin-top:9px;">Seleccioná 4 items del mismo grupo · ${ch.groups.length} grupos en total</div>`;
    return html;
}

function selectConn(i) {
    const el = $(`conn-${i}`);
    if (!el || el.classList.contains('solved')) return;
    if (el.classList.contains('selected')) {
        el.classList.remove('selected');
        selectedItems = selectedItems.filter(x => x !== i);
    } else if (selectedItems.length < 4) {
        el.classList.add('selected');
        selectedItems.push(i);
    }
}

function clearConn() {
    selectedItems.forEach(i => $(`conn-${i}`)?.classList.remove('selected'));
    selectedItems = [];
}

function checkConn() {
    if (selectedItems.length !== 4) return;
    const shuffled = currentChallenge._shuffled;
    const gis = selectedItems.map(i => shuffled[i].gi);
    const allSame = gis.every(g => g === gis[0]);

    if (allSame) {
        const gi    = gis[0];
        const group = currentChallenge.groups[gi];
        selectedItems.forEach(i => { $(`conn-${i}`)?.classList.add('solved'); });
        solvedGroups.push(gi);

        const solved = $('solved-groups');
        if (solved) solved.innerHTML += `
            <div class="solved-group" style="background:${group.color}22; border:1px solid ${group.color}55;">
                <div class="solved-group-name">${group.name}</div>
                <div class="solved-group-items">${group.items.join(' · ')}</div>
            </div>`;
        selectedItems = [];
        if (solvedGroups.length === currentChallenge.groups.length) setTimeout(doSubmit, 700);
    } else {
        selectedItems.forEach(i => {
            const el = $(`conn-${i}`);
            el?.classList.remove('selected');
            el?.classList.add('shake');
            setTimeout(() => el?.classList.remove('shake'), 450);
        });
        selectedItems = [];
    }
}

// ── ORDERING ────────────────────────
function renderOrdering(ch) {
    const shuffledIdx = shuffle([...Array(ch.items.length).keys()]);
    currentChallenge._shuffledIdx = shuffledIdx;
    currentChallenge._displayItems = shuffledIdx.map(i => ch.items[i]);
    orderedSlots = new Array(ch.items.length).fill(null);

    let html = '<div id="order-slots">';
    for (let i = 0; i < ch.items.length; i++) {
        html += `
            <div class="order-slot" id="slot-${i}" onclick="placeInSlot(${i})">
                <div class="slot-number">${i + 1}</div>
                <div id="slot-txt-${i}" style="font-size:0.82rem; color:var(--text-muted);">Tocá un item para colocar aquí</div>
            </div>`;
    }
    html += '</div>';
    html += '<div style="font-size:0.76rem; color:var(--text-muted); margin:10px 0 6px;">Items disponibles:</div>';
    html += '<div class="order-items-pool" id="order-pool">';
    currentChallenge._displayItems.forEach((item, i) => {
        html += `<div class="order-item" id="oitem-${i}" onclick="pickOrderItem(${i})">${item}</div>`;
    });
    html += '</div>';
    return html;
}

function pickOrderItem(i) {
    const el = $(`oitem-${i}`);
    if (!el || el.style.display === 'none') return;
    if (pickedItem !== null) $(`oitem-${pickedItem}`)?.classList.remove('picked');
    if (pickedItem === i) { pickedItem = null; return; }
    pickedItem = i;
    el.classList.add('picked');
}

function placeInSlot(slotIdx) {
    if (pickedItem === null) return;
    const item = currentChallenge._displayItems[pickedItem];

    // If slot occupied → return old item to pool
    if (orderedSlots[slotIdx] !== null) {
        const prev = orderedSlots[slotIdx];
        $(`oitem-${prev}`).style.display = '';
        const stxt = $(`slot-txt-${slotIdx}`);
        if (stxt) { stxt.textContent = 'Tocá un item para colocar aquí'; stxt.style.color = 'var(--text-muted)'; }
        $(`slot-${slotIdx}`)?.classList.remove('has-item');
    }

    orderedSlots[slotIdx] = pickedItem;
    $(`oitem-${pickedItem}`).style.display = 'none';
    const stxt = $(`slot-txt-${slotIdx}`);
    if (stxt) { stxt.textContent = item; stxt.style.color = 'white'; }
    $(`slot-${slotIdx}`)?.classList.add('has-item');
    $(`oitem-${pickedItem}`)?.classList.remove('picked');
    pickedItem = null;

    if (orderedSlots.every(s => s !== null)) {
        $('playing-submit').style.display = 'block';
    }
}

// ── CROSSWORD ────────────────────────
function renderCrossword(ch) {
    cwUserGrid = ch.solution.map(row => row.map(cell => cell === null ? null : ''));

    // Map (row,col) → clue number
    const numMap = {};
    [...ch.clues.across, ...ch.clues.down].forEach(cl => {
        numMap[`${cl.row},${cl.col}`] = cl.num;
    });

    let html = '<div class="cw-wrap">';
    html += '<div class="cw-grid">';
    for (let r = 0; r < ch.rows; r++) {
        for (let c = 0; c < ch.cols; c++) {
            if (ch.solution[r][c] === null) {
                html += '<div class="cw-cell black"></div>';
            } else {
                const num = numMap[`${r},${c}`] || '';
                html += `<div class="cw-cell" id="cwc-${r}-${c}" onclick="cwTap(${r},${c})">
                    ${num ? `<span class="cw-num">${num}</span>` : ''}
                    <span class="cw-letter" id="cwl-${r}-${c}"></span>
                </div>`;
            }
        }
    }
    html += '</div>'; // cw-grid

    // QWERTY keyboard
    html += '<div class="cw-keyboard" style="display:flex;flex-direction:column;gap:4px;">';
    [['Q','W','E','R','T','Y','U','I','O','P'],
     ['A','S','D','F','G','H','J','K','L'],
     ['Z','X','C','V','B','N','M']].forEach(rowKeys => {
        html += '<div style="display:flex;gap:4px;justify-content:center;">';
        rowKeys.forEach(k => {
            html += `<button class="cw-key" onclick="cwInput('${k}')">${k}</button>`;
        });
        html += '</div>';
    });
    html += '<div style="display:flex;justify-content:center;">';
    html += `<button class="cw-key cw-key-del" onclick="cwInput('DEL')" style="padding:9px 18px;min-width:80px;">⌫ Borrar</button>`;
    html += '</div>';
    html += '</div>';

    // Clues
    html += '<div class="cw-clues">';
    html += '<div class="cw-clue-col"><div class="cw-clue-title">→ Horizontal</div>';
    ch.clues.across.forEach(cl => {
        html += `<div class="cw-clue-item" id="cwci-a-${cl.num}" onclick="cwSelectClue('across',${cl.num},${cl.row},${cl.col})">${cl.num}. ${cl.text}</div>`;
    });
    html += '</div>';
    html += '<div class="cw-clue-col"><div class="cw-clue-title">↓ Vertical</div>';
    ch.clues.down.forEach(cl => {
        html += `<div class="cw-clue-item" id="cwci-d-${cl.num}" onclick="cwSelectClue('down',${cl.num},${cl.row},${cl.col})">${cl.num}. ${cl.text}</div>`;
    });
    html += '</div></div>'; // cw-clues
    html += '</div>'; // cw-wrap
    return html;
}

function cwTap(r, c) {
    if (cwSelRow === r && cwSelCol === c) {
        cwDir = cwDir === 'across' ? 'down' : 'across';
    } else {
        cwSelRow = r; cwSelCol = c;
    }
    cwHighlight();
}

function cwSelectClue(dir, num, row, col) {
    cwDir = dir; cwSelRow = row; cwSelCol = col;
    cwHighlight();
    // Scroll grid into view
    document.getElementById(`cwc-${row}-${col}`)?.scrollIntoView({ block: 'nearest' });
}

function cwGetWordCells(r, c, dir, ch) {
    const cells = [];
    if (dir === 'across') {
        let sc = c;
        while (sc > 0 && ch.solution[r][sc-1] !== null) sc--;
        let cc = sc;
        while (cc < ch.cols && ch.solution[r][cc] !== null) { cells.push([r, cc]); cc++; }
    } else {
        let sr = r;
        while (sr > 0 && ch.solution[sr-1][c] !== null) sr--;
        let rr = sr;
        while (rr < ch.rows && ch.solution[rr][c] !== null) { cells.push([rr, c]); rr++; }
    }
    return cells;
}

function cwHighlight() {
    const ch = currentChallenge;
    document.querySelectorAll('.cw-cell:not(.black)').forEach(el => el.classList.remove('cw-sel','cw-word'));
    document.querySelectorAll('.cw-clue-item').forEach(el => el.classList.remove('cw-clue-active'));
    if (cwSelRow < 0) return;

    const wordCells = cwGetWordCells(cwSelRow, cwSelCol, cwDir, ch);
    wordCells.forEach(([wr, wc]) => $(`cwc-${wr}-${wc}`)?.classList.add('cw-word'));
    $(`cwc-${cwSelRow}-${cwSelCol}`)?.classList.remove('cw-word');
    $(`cwc-${cwSelRow}-${cwSelCol}`)?.classList.add('cw-sel');

    // Highlight clue
    if (wordCells.length) {
        const [sr, sc] = wordCells[0];
        const clues = cwDir === 'across' ? ch.clues.across : ch.clues.down;
        const active = clues.find(cl => cl.row === sr && cl.col === sc);
        if (active) $(`cwci-${cwDir==='across'?'a':'d'}-${active.num}`)?.classList.add('cw-clue-active');
    }
}

function cwInput(letter) {
    if (cwSelRow < 0) return;
    const ch = currentChallenge;
    if (ch.solution[cwSelRow]?.[cwSelCol] === null) return;

    if (letter === 'DEL') {
        if (cwUserGrid[cwSelRow][cwSelCol] !== '') {
            cwUserGrid[cwSelRow][cwSelCol] = '';
            const el = $(`cwl-${cwSelRow}-${cwSelCol}`);
            if (el) el.textContent = '';
            $(`cwc-${cwSelRow}-${cwSelCol}`)?.classList.remove('cw-correct');
        } else {
            cwRetreat(ch);
        }
    } else {
        const L = letter.toUpperCase();
        cwUserGrid[cwSelRow][cwSelCol] = L;
        const el = $(`cwl-${cwSelRow}-${cwSelCol}`);
        if (el) el.textContent = L;
        // Color feedback
        const cell = $(`cwc-${cwSelRow}-${cwSelCol}`);
        if (cell) {
            cell.classList.toggle('cw-correct', L === ch.solution[cwSelRow][cwSelCol]);
        }
        cwAdvance(ch);
        cwCheckComplete(ch);
    }
}

function cwAdvance(ch) {
    const wordCells = cwGetWordCells(cwSelRow, cwSelCol, cwDir, ch);
    const idx = wordCells.findIndex(([r,c]) => r === cwSelRow && c === cwSelCol);
    if (idx >= 0 && idx < wordCells.length - 1) {
        [cwSelRow, cwSelCol] = wordCells[idx + 1];
        cwHighlight();
    }
}

function cwRetreat(ch) {
    const wordCells = cwGetWordCells(cwSelRow, cwSelCol, cwDir, ch);
    const idx = wordCells.findIndex(([r,c]) => r === cwSelRow && c === cwSelCol);
    if (idx > 0) {
        [cwSelRow, cwSelCol] = wordCells[idx - 1];
        cwUserGrid[cwSelRow][cwSelCol] = '';
        const el = $(`cwl-${cwSelRow}-${cwSelCol}`);
        if (el) el.textContent = '';
        $(`cwc-${cwSelRow}-${cwSelCol}`)?.classList.remove('cw-correct');
        cwHighlight();
    }
}

function cwCheckComplete(ch) {
    for (let r = 0; r < ch.rows; r++) {
        for (let c = 0; c < ch.cols; c++) {
            if (ch.solution[r][c] !== null && cwUserGrid[r][c] === '') return;
        }
    }
    setTimeout(doSubmit, 600);
}

// Physical keyboard support for crossword
document.addEventListener('keydown', function(e) {
    if (!currentChallenge || currentChallenge.type !== 'crossword' || cwSelRow < 0) return;
    const ch = currentChallenge;
    if (e.key === 'Backspace') { e.preventDefault(); cwInput('DEL'); }
    else if (e.key === 'ArrowRight') { e.preventDefault(); cwDir='across'; cwAdvance(ch); cwHighlight(); }
    else if (e.key === 'ArrowLeft')  { e.preventDefault(); cwDir='across'; cwRetreat(ch); cwHighlight(); }
    else if (e.key === 'ArrowDown')  { e.preventDefault(); cwDir='down';   cwAdvance(ch); cwHighlight(); }
    else if (e.key === 'ArrowUp')    { e.preventDefault(); cwDir='down';   cwRetreat(ch); cwHighlight(); }
    else if (e.key.length === 1 && /[a-zA-ZñÑ]/.test(e.key)) { cwInput(e.key); }
});

// ─────────────────────────────────────
// SUBMIT & SCORING
// ─────────────────────────────────────
async function doSubmit() {
    if (timerInterval) { clearInterval(timerInterval); timerInterval = null; }

    const ch          = currentChallenge;
    const elapsedSec  = Math.floor((Date.now() - challengeStartTime) / 1000);
    const pubElapsed  = (Date.now() - new Date(ch.publishedAt)) / 60000; // minutes since publish
    const speedMult   = Math.max(1.0, 2.0 - pubElapsed / 60);

    let accuracyScore = 0;
    let answerData    = null;

    if (ch.type === 'trivia') {
        accuracyScore = (selectedAnswer === ch.answer) ? 100 : 0;
        answerData    = selectedAnswer;

    } else if (ch.type === 'numeric') {
        const userVal = parseFloat($('numeric-answer')?.value) || 0;
        const diff    = Math.abs(userVal - ch.answer) / Math.max(1, Math.abs(ch.answer));
        accuracyScore = Math.max(0, Math.round(100 * (1 - Math.min(1, diff * 1.5))));
        answerData    = userVal;

    } else if (ch.type === 'connections') {
        accuracyScore = Math.round((solvedGroups.length / ch.groups.length) * 100);
        answerData    = solvedGroups.length;

    } else if (ch.type === 'ordering') {
        let correctCount = 0;
        orderedSlots.forEach((itemIdx, slotIdx) => {
            if (itemIdx !== null) {
                const originalIdx = ch._shuffledIdx[itemIdx];
                if (originalIdx === ch.correctOrder[slotIdx]) correctCount++;
            }
        });
        accuracyScore = Math.round((correctCount / ch.items.length) * 100);
        answerData    = JSON.stringify(orderedSlots);

    } else if (ch.type === 'crossword') {
        let correct = 0, total = 0;
        for (let r = 0; r < ch.rows; r++) {
            for (let c = 0; c < ch.cols; c++) {
                if (ch.solution[r][c] !== null) {
                    total++;
                    if (cwUserGrid[r] && cwUserGrid[r][c] === ch.solution[r][c]) correct++;
                }
            }
        }
        accuracyScore = total > 0 ? Math.round((correct / total) * 100) : 0;
        answerData    = `${correct}/${total}`;
    }

    const finalScore = Math.round(accuracyScore * speedMult);

    // Save locally
    saveSubmission(ch.id, finalScore);

    // Send to backend
    if (currentUser) {
        await apiCall('submit', {
            userId: currentUser.id, challengeId: ch.id,
            answer: String(answerData), score: finalScore,
            accuracy: accuracyScore, speedMultiplier: speedMult,
            timeSeconds: elapsedSec
        });
        currentUser.totalPoints = Number(currentUser.totalPoints || 0) + finalScore;
        saveUser(currentUser);
        $('home-pts').textContent = `${currentUser.totalPoints} pts`;
    }

    showResult(finalScore, accuracyScore, speedMult, elapsedSec);
}

function showResult(score, accuracy, speedMult, elapsed) {
    let emoji, msg;
    if      (score >= 180) { emoji = '🔥'; msg = '¡Increíble! Fuiste rápido y acertado.'; }
    else if (score >= 140) { emoji = '⚡'; msg = '¡Muy buen resultado!'; }
    else if (score >= 100) { emoji = '👍'; msg = 'Buen puntaje. ¡A seguir mejorando!'; }
    else if (score >= 50)  { emoji = '😅'; msg = 'Hay margen para mejorar. ¡La próxima!'; }
    else                   { emoji = '💪'; msg = 'Uy... pero ya sumaste puntos igual.'; }

    $('result-emoji').textContent    = emoji;
    $('result-score').textContent    = score;
    $('result-accuracy').textContent = `${accuracy}%`;
    $('result-speed').textContent    = `×${speedMult.toFixed(1)}`;
    $('result-time').textContent     = `${elapsed}s`;
    $('result-message').textContent  = msg;

    showScreen('screen-result');
}

// LEADERBOARD
// ─────────────────────────────────────
async function loadLeaderboard() {
    $('home-content').innerHTML = '<div class="loading"><div class="spinner"></div></div>';
    const res = await apiCall('leaderboard');
    if (!res.success || !res.leaderboard?.length) {
        $('home-content').innerHTML = `<div class="empty-state"><div class="empty-icon">🏆</div>Todavía no hay puntuaciones. ¡Sé el primero!</div>`;
        return;
    }
    const medals  = ['🥇','🥈','🥉'];
    const colors  = ['#7C6EFA','#FF6464','#64C8FF','#FFD700','#64FF96','#FF9A3C'];
    let html = `<div style="font-size:1rem; font-weight:700; margin-bottom:14px;">🏆 Ranking General</div>`;
    res.leaderboard.forEach((e, i) => {
        const isMe   = currentUser && e.username === currentUser.username;
        const rank   = medals[i] || `#${e.rank}`;
        const color  = colors[i % colors.length];
        html += `
            <div class="lb-row ${isMe ? 'me' : ''}">
                <div class="lb-rank">${rank}</div>
                <div class="lb-avatar" style="background:${color}">${getInitials(e.nombre || e.username)}</div>
                <div class="lb-name">${e.nombre || e.username}${isMe ? ' <span style="font-size:0.68rem;opacity:0.5;">(vos)</span>' : ''}</div>
                <div class="lb-pts">${e.points} pts</div>
            </div>`;
    });
    $('home-content').innerHTML = html;
}

// ─────────────────────────────────────
// HISTORY
// ─────────────────────────────────────
function loadHistory() {
    const subs = getSubmissions();
    const ids  = Object.keys(subs).reverse();
    if (!ids.length) {
        $('home-content').innerHTML = `<div class="empty-state"><div class="empty-icon">📊</div>Todavía no participaste en ningún challenge.</div>`;
        return;
    }
    let html = `<div style="font-size:1rem; font-weight:700; margin-bottom:14px;">📊 Tu historial</div>`;
    ids.forEach(id => {
        const s  = subs[id];
        const ch = CHALLENGES.find(c => c.id === parseInt(id));
        const d  = new Date(s.date).toLocaleDateString('es-AR', { day: 'numeric', month: 'short' });
        html += `
            <div class="card" style="margin-bottom:9px; display:flex; align-items:center; gap:12px;">
                <div style="flex:1;">
                    <div style="font-weight:600; font-size:0.88rem;">${(ch?.question || `Challenge #${id}`).slice(0, 52)}…</div>
                    <div style="font-size:0.73rem; color:var(--text-muted); margin-top:3px;">${d} · ${ch?.category || ''} · ${typeEmoji[ch?.type] || ''}</div>
                </div>
                <div style="text-align:right;">
                    <div style="font-weight:800; color:var(--gold); font-size:1.1rem;">${s.score}</div>
                    <div style="font-size:0.68rem; color:var(--text-muted);">pts</div>
                </div>
            </div>`;
    });
    $('home-content').innerHTML = html;
}

// ─────────────────────────────────────
// ADMIN PANEL
// ─────────────────────────────────────
let adminCurrentTab = 'challenges';

async function enterAdmin() {
    showScreen('screen-admin');
    adminSwitchTab('challenges');
    loadAdminPanel();
}

function adminSwitchTab(tab) {
    adminCurrentTab = tab;
    ['challenges','ranking'].forEach(t => {
        const btn = $(`atab-${t}`);
        if (btn) { btn.className = `btn btn-sm ${t === tab ? 'btn-primary' : 'btn-ghost'}`; }
    });
    if (tab === 'challenges') loadAdminPanel();
    else                      loadAdminLeaderboard();
}

async function loadAdminPanel() {
    $('admin-content').innerHTML = '<div class="loading"><div class="spinner"></div></div>';
    const res = await apiCall('adminGetChallenges');
    if (!res.success) { $('admin-content').innerHTML = '<div style="color:var(--red)">Error al cargar</div>'; return; }

    const { challenges, activeId, totalSubs } = res;

    $('admin-stats').innerHTML = `
        <div style="flex:1; background:rgba(255,255,255,0.06); border-radius:12px; padding:12px; text-align:center;">
            <div style="font-size:1.4rem; font-weight:800; color:var(--gold)">${totalSubs || 0}</div>
            <div style="font-size:0.7rem; color:var(--text-muted);">RESPUESTAS HOY</div>
        </div>
        <div style="flex:1; background:rgba(255,255,255,0.06); border-radius:12px; padding:12px; text-align:center;">
            <div style="font-size:1.4rem; font-weight:800; color:var(--primary-light)">${challenges.length}</div>
            <div style="font-size:0.7rem; color:var(--text-muted);">CHALLENGES TOTALES</div>
        </div>`;

    let html = `<div style="font-size:0.82rem; font-weight:700; color:var(--text-muted); text-transform:uppercase; letter-spacing:1px; margin-bottom:12px;">Challenges disponibles:</div>`;
    challenges.forEach(ch => {
        const isActive = ch.id === activeId;
        html += `
            <div class="admin-card ${isActive ? 'active-challenge' : ''}">
                <div style="display:flex; align-items:center; gap:8px; margin-bottom:6px;">
                    <div class="type-badge ${typeBadge[ch.type]}">${typeEmoji[ch.type]}</div>
                    ${isActive ? '<span style="color:var(--gold); font-size:0.72rem; font-weight:700;">● ACTIVO</span>' : ''}
                </div>
                <div style="font-size:0.7rem; color:var(--text-muted); margin-bottom:4px; text-transform:uppercase; letter-spacing:1px;">${ch.category}</div>
                <div style="font-weight:600; font-size:0.88rem; margin-bottom:10px;">${ch.question}</div>
                <div style="display:flex; gap:8px;">
                    <button class="btn btn-primary btn-sm" onclick="adminActivate(${ch.id})" style="flex:1;">
                        ${isActive ? '↺ Reactivar' : 'Activar →'}
                    </button>
                    ${isActive ? `<button class="btn btn-danger btn-sm" onclick="adminDeactivate()" style="flex:1;">⏸ Desactivar</button>` : ''}
                </div>
            </div>`;
    });

    if (activeId) {
        html += `<div style="margin-top:8px; padding:10px 14px; background:rgba(255,82,82,0.08); border:1px solid rgba(255,82,82,0.2); border-radius:12px; font-size:0.78rem; color:var(--text-muted);">
            💡 Desactivar deja sin challenge activo — los janijim verán "sin challenge por ahora"
        </div>`;
    }

    $('admin-content').innerHTML = html;
}

async function adminActivate(id) {
    const res = await apiCall('adminActivate', { challengeId: id });
    if (res.success) {
        loadAdminPanel();
        adminToast('✓ Challenge activado — ¡Compartí el link! 📲', '#00E676');
    }
}

async function adminDeactivate() {
    const res = await apiCall('adminActivate', { challengeId: 0 });
    if (res.success) {
        loadAdminPanel();
        adminToast('⏸ Challenge desactivado', '#FF8A8A');
    }
}

function adminToast(msg, color = '#00E676') {
    const t = document.createElement('div');
    t.style.cssText = `position:fixed;top:20px;left:50%;transform:translateX(-50%);background:${color};color:#0a0a1a;padding:10px 20px;border-radius:20px;font-weight:700;font-size:0.85rem;z-index:9999;white-space:nowrap;`;
    t.textContent = msg;
    document.body.appendChild(t);
    setTimeout(() => t.remove(), 3000);
}

async function loadAdminLeaderboard() {
    $('admin-content').innerHTML = '<div class="loading"><div class="spinner"></div></div>';
    const res = await apiCall('leaderboard');
    if (!res.success || !res.leaderboard) {
        $('admin-content').innerHTML = '<div style="color:var(--text-muted); text-align:center; padding:20px;">Sin datos aún</div>';
        return;
    }
    const board = res.leaderboard;
    const medals = ['🥇','🥈','🥉'];
    let html = `<div style="font-size:0.82rem; font-weight:700; color:var(--text-muted); text-transform:uppercase; letter-spacing:1px; margin-bottom:12px;">${board.length} participantes</div>`;
    board.forEach((u, i) => {
        const isTop = i < 3;
        html += `
            <div style="display:flex; align-items:center; gap:12px; padding:10px 14px; background:${isTop ? 'rgba(255,215,0,0.08)' : 'rgba(255,255,255,0.04)'}; border-radius:12px; margin-bottom:6px; border:1px solid ${isTop ? 'rgba(255,215,0,0.2)' : 'rgba(255,255,255,0.08)'};">
                <div style="font-size:${isTop ? '1.3rem' : '0.9rem'}; font-weight:800; width:28px; text-align:center; color:${isTop ? 'var(--gold)' : 'var(--text-muted)'};">${medals[i] || `#${i+1}`}</div>
                <div style="flex:1;">
                    <div style="font-weight:600; font-size:0.88rem;">${u.nombre || u.username}</div>
                    <div style="font-size:0.7rem; color:var(--text-muted);">@${u.username}</div>
                </div>
                <div style="font-weight:800; font-size:1.1rem; color:${isTop ? 'var(--gold)' : 'var(--primary-light)'};">${Number(u.points || 0)}</div>
            </div>`;
    });
    if (board.length === 0) html = '<div style="color:var(--text-muted); text-align:center; padding:20px;">Todavía no hay participantes</div>';
    $('admin-content').innerHTML = html;
}

// ─────────────────────────────────────
// INIT
// ─────────────────────────────────────
(function init() {
    const stored = loadStoredUser();
    if (stored) { currentUser = stored; enterApp(); }
    else showScreen('screen-login');
})();
</script>
</body>
</html>
